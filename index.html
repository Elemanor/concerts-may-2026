<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5efe1;          /* ivory parchment */
    --bg2:#ede4d0;         /* deeper cream */
    --card:#fffbf0;        /* warm white program paper */
    --card-past:#e8e0cb;   /* faded ivory */
    --text:#2a1810;        /* deep sepia ink */
    --text-soft:#3a2a1c;
    --muted:#7a6a52;       /* warm taupe */
    --muted-past:#9a8d72;
    --gold:#a0763d;        /* brass */
    --gold-deep:#85602e;
    --burgundy:#6b1f24;    /* concert hall red */
    --burgundy-soft:#8b3036;
    --line:#d6c9ad;        /* gilt rule */
    --line-soft:#e7dcc1;
    --today:#a0763d;
    --ok-bg:#e8e0c5;
    --ok-fg:#5a4520;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Lora','Georgia',serif;
    background:
      radial-gradient(ellipse at top,#faf4e3 0%,transparent 60%),
      linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    background-attachment:fixed;
    color:var(--text);
    line-height:1.55;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    min-height:100vh;
    font-size:15px;
  }
  ::selection{background:var(--gold);color:#fff}

  header{
    padding:18px 18px 16px;
    text-align:center;
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:10;
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    background:rgba(245,239,225,.92);
    box-shadow:0 1px 0 rgba(160,118,61,.08);
    transition:padding .3s ease, background .3s ease;
  }
  .logo{
    display:block;
    width:62px; height:62px;
    margin:0 auto 6px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid var(--gold);
    box-shadow:0 2px 8px rgba(107,31,36,.18), 0 0 0 4px rgba(160,118,61,.08);
    background:#fffbf0;
    transition:width .3s ease, height .3s ease, margin .3s ease, box-shadow .3s ease;
  }
  h1{
    margin:0;
    font-family:'Cormorant Garamond',serif;
    font-size:28px;
    font-weight:600;
    letter-spacing:.5px;
    color:var(--burgundy);
    line-height:1.1;
    overflow:hidden;
    max-height:60px;
    transition:font-size .3s ease, max-height .3s ease, opacity .25s ease, margin .3s ease;
  }
  h1 .ornament{color:var(--gold);font-style:italic;margin:0 8px;font-weight:400}
  .sub{
    margin:4px 0 0;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:15px;
    color:var(--muted);
    letter-spacing:.3px;
    overflow:hidden;
    transition:max-height .3s ease, opacity .25s ease, margin .3s ease;
    max-height:30px;
  }
  .from{
    font-size:12.5px;
    color:var(--gold-deep);
    margin-top:8px;
    font-weight:500;
    letter-spacing:.4px;
    overflow:hidden;
    transition:max-height .3s ease, opacity .25s ease, margin .3s ease;
    max-height:30px;
  }
  .from::before{content:"❦ ";color:var(--gold)}

  /* Compact header when scrolled */
  header.scrolled{
    padding:8px 14px;
    background:rgba(245,239,225,.96);
  }
  header.scrolled .logo{
    width:36px; height:36px;
    margin:0 auto;
    border-width:1.5px;
    box-shadow:0 1px 4px rgba(107,31,36,.15), 0 0 0 2px rgba(160,118,61,.08);
  }
  header.scrolled h1,
  header.scrolled .sub,
  header.scrolled .from{
    max-height:0;
    opacity:0;
    margin:0;
    pointer-events:none;
  }

  main{padding:18px 14px 40px;max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:18px}

  .day-divider{
    display:flex;align-items:center;gap:14px;
    color:var(--gold-deep);
    font-family:'Cormorant Garamond',serif;
    font-size:15px;
    font-style:italic;
    letter-spacing:1.5px;
    text-align:center;
    margin:14px 4px 0;
    font-weight:500;
    text-transform:lowercase;
  }
  .day-divider::before, .day-divider::after{
    content:"";flex:1;height:1px;
    background:linear-gradient(90deg,transparent,var(--line),transparent);
  }
  .day-divider.today{color:var(--burgundy);font-weight:600}
  .day-divider.today::before, .day-divider.today::after{
    background:linear-gradient(90deg,transparent,var(--burgundy-soft),transparent);
  }

  .card{
    background:var(--card);
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 1px 2px rgba(42,24,16,.06), 0 8px 24px rgba(42,24,16,.08);
    border:1px solid var(--line);
    transition:opacity .3s, box-shadow .3s, border-color .3s;
    scroll-margin-top:120px;
    position:relative;
  }
  .card.past{
    opacity:.55;
    background:var(--card-past);
    filter:sepia(.25) grayscale(.3);
    box-shadow:0 1px 4px rgba(42,24,16,.05);
  }
  .card.next{
    border-color:var(--gold);
    box-shadow:0 1px 2px rgba(160,118,61,.15), 0 10px 30px rgba(160,118,61,.18);
  }
  .card.next::before{
    content:"";
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg,var(--gold) 0%,#d4a868 50%,var(--gold) 100%);
  }

  .hero{
    position:relative;
    height:170px;
    display:flex;
    align-items:flex-end;
    padding:12px 16px;
    color:#fff;
    overflow:hidden;
    background-size:cover;
    background-position:center;
  }
  .hero::before{
    content:"";
    position:absolute;inset:0;
    background:
      linear-gradient(180deg,rgba(42,24,16,.05) 0%,rgba(42,24,16,.7) 100%),
      linear-gradient(135deg,rgba(107,31,36,.15),rgba(160,118,61,.15));
  }
  .hero::after{
    content:"";
    position:absolute;
    left:14px;right:14px;bottom:50px;
    height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,245,210,.45),transparent);
  }
  .hero .icon{
    position:absolute;
    right:14px; top:12px;
    font-size:32px;
    opacity:.95;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));
  }
  .hero .date{
    position:relative;
    font-family:'Cormorant Garamond',serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:1px;
    background:rgba(42,24,16,.55);
    padding:5px 12px;
    border-radius:2px;
    border:1px solid rgba(212,168,104,.4);
    backdrop-filter:blur(4px);
  }

  .body{padding:16px 18px 4px}
  .title{
    font-family:'Cormorant Garamond',serif;
    font-size:22px;
    font-weight:600;
    margin:0 0 8px;
    line-height:1.2;
    color:var(--text);
    letter-spacing:.2px;
  }
  .meta{
    display:flex;flex-wrap:wrap;gap:10px;align-items:center;
    font-size:12.5px;color:var(--muted);
    margin-bottom:12px;
    padding-bottom:12px;
    border-bottom:1px solid var(--line-soft);
  }
  .meta span{display:inline-flex;align-items:center;gap:5px}
  .meta .type{
    font-family:'Cormorant Garamond',serif;
    font-size:14px;
    font-style:italic;
    color:var(--gold-deep);
    letter-spacing:.3px;
  }
  .pill{
    background:var(--ok-bg);
    color:var(--ok-fg);
    padding:3px 10px;
    border-radius:2px;
    font-weight:600;
    font-size:10.5px;
    letter-spacing:1.2px;
    text-transform:uppercase;
    border:1px solid rgba(160,118,61,.3);
  }
  .desc{
    font-size:14.5px;
    color:var(--text-soft);
    margin:0;
    max-height:0;
    overflow:hidden;
    transition:max-height .35s ease, margin .25s, padding .25s;
    font-style:normal;
    line-height:1.6;
  }
  .desc::first-letter{
    font-family:'Cormorant Garamond',serif;
    font-size:1.4em;
    color:var(--burgundy);
    font-weight:600;
  }
  .card.open .desc{max-height:700px;margin:0 0 14px;padding-top:2px}
  .card.past .desc{color:var(--muted-past)}

  .walk{
    display:flex;
    gap:12px;
    padding:11px 14px;
    background:rgba(160,118,61,.06);
    border-left:3px solid var(--gold);
    border-radius:2px;
    margin:0 0 14px;
    font-size:13.5px;
    align-items:center;
    color:var(--text-soft);
  }
  .walk .lead{font-size:20px;color:var(--gold-deep)}
  .walk b{color:var(--burgundy);font-weight:600}
  .walk small{color:var(--muted);font-style:italic;font-size:12px}
  .card.past .walk{background:rgba(122,106,82,.08);border-left-color:var(--muted-past)}
  .card.past .walk b{color:var(--muted-past)}

  .actions{
    display:flex;gap:8px;
    padding:0 0 16px;
    align-items:stretch;
  }
  .btn{
    flex:1;
    text-align:center;
    text-decoration:none;
    padding:10px 14px;
    border-radius:2px;
    font-size:13px;
    font-weight:500;
    font-family:'Cormorant Garamond',serif;
    letter-spacing:1px;
    text-transform:uppercase;
    border:1px solid transparent;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    gap:5px;
    transition:transform .15s, box-shadow .15s;
  }
  .btn:active{transform:translateY(1px)}
  .btn[data-toggle]{flex:0 0 44px;font-size:13px;text-transform:none;letter-spacing:0}
  .btn.primary{
    background:linear-gradient(180deg,#8b3036,var(--burgundy));
    color:#fff7e3;
    border-color:#4a1316;
    box-shadow:0 1px 0 rgba(255,245,210,.2) inset, 0 2px 6px rgba(107,31,36,.25);
  }
  .btn.ghost{
    background:transparent;
    border:1px solid var(--line);
    color:var(--gold-deep);
  }
  .btn.ghost:hover{background:rgba(160,118,61,.06)}
  .card.past .btn.primary{
    background:var(--muted-past);color:#fff;border-color:transparent;
    box-shadow:none;
  }
  .card.past .btn.ghost{color:var(--muted-past)}

  footer{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    font-style:italic;
    font-family:'Cormorant Garamond',serif;
    padding:30px 22px 40px;
    line-height:1.7;
    letter-spacing:.3px;
  }
  footer::before{
    content:"❦";
    display:block;
    color:var(--gold);
    font-size:20px;
    font-style:normal;
    margin-bottom:10px;
  }
  footer a{color:var(--burgundy);text-decoration:none;border-bottom:1px solid var(--line)}

  @media (min-width: 600px){
    main{padding:24px 20px 40px}
    .hero{height:200px}
    h1{font-size:32px}
  }
</style>
</head>

// --- helpers ---
function eventDateTime(e){
  return new Date(e.date + "T" + e.time + ":00-04:00");
}
function isPast(e){
  const dt = eventDateTime(e);
  const end = new Date(dt.getTime() + 90*60*1000); // event "active" 90 min
  return end < TODAY;
}
function dayLabel(dateStr){
  const d = new Date(dateStr + "T12:00:00-04:00");
  const days = ["Воскресенье","Понедельник","Вторник","Среда","Четверг","Пятница","Суббота"];
  const months = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
  return days[d.getDay()] + ", " + d.getDate() + " " + months[d.getMonth()];
}
function isToday(dateStr){
  const d = new Date(dateStr + "T12:00:00-04:00");
  return d.toDateString() === TODAY.toDateString();
}
function fmtKm(km){
  if(km == null) return "—";
  return km < 1 ? Math.round(km*1000) + " м" : km.toFixed(1) + " км";
}
function fmtMin(min){
  if(min == null) return "—";
  if(min < 60) return min + " мин";
  const h = Math.floor(min/60), m = min%60;
  return h + " ч " + (m ? m + " мин" : "");
}
function mapsLink(venue){
  const o = encodeURIComponent(ORIGIN_NAME);
  const d = venue.mapDest || encodeURIComponent(venue.addr + " Toronto");
  return `https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${d}&travelmode=walking`;
}

// --- render ---
const list = document.getElementById("list");
let firstUpcomingId = null;
let lastDay = null;

EVENTS.sort((a,b)=>eventDateTime(a)-eventDateTime(b)).forEach((e,i)=>{
  const past = isPast(e);
  const venue = VENUES[e.venue];
  const t = TYPE_META[e.type];
  const id = "ev-" + i;

  if(!past && firstUpcomingId === null) firstUpcomingId = id;

  // day divider
  if(e.date !== lastDay){
    const div = document.createElement("div");
    div.className = "day-divider" + (isToday(e.date) ? " today" : "");
    div.textContent = dayLabel(e.date) + (isToday(e.date) ? " · сегодня" : "");
    list.appendChild(div);
    lastDay = e.date;
  }

  const card = document.createElement("article");
  card.className = "card" + (past ? " past" : "");
  card.id = id;

  const isNext = !past && firstUpcomingId === id;
  if(isNext) card.classList.add("next","open");

  const walkHTML = venue.km != null
    ? `<div class="walk">
         <span class="lead">🚶</span>
         <div>пешком <b>${fmtMin(venue.min)}</b> · <b>${fmtKm(venue.km)}</b><br>
              <small style="color:var(--muted)">${venue.name}, ${venue.addr}</small></div>
       </div>`
    : `<div class="walk">
         <span class="lead">🗺️</span>
         <div>${venue.name}<br><small style="color:var(--muted)">${venue.addr}</small></div>
       </div>`;

  card.innerHTML = `
    <div class="hero" style="background-image:url('images/${e.type}.jpg')">
      <span class="icon">${t.icon}</span>
      <span class="date">${e.time}</span>
    </div>
    <div class="body">
      <h2 class="title">${e.title}</h2>
      <div class="meta">
        <span class="type">${t.icon} ${t.label}</span>
        <span class="pill">Бесплатно</span>
      </div>
      <p class="desc">${e.desc}</p>
      ${walkHTML}
      <div class="actions">
        <a class="btn primary" href="${mapsLink(venue)}" target="_blank" rel="noopener">Маршрут</a>
        <a class="btn ghost" href="${venue.site}" target="_blank" rel="noopener">Сайт</a>
        <button class="btn ghost" data-toggle aria-label="Развернуть">${isNext ? "▲" : "▼"}</button>
      </div>
    </div>
  `;

  card.querySelector("[data-toggle]").addEventListener("click",()=>{
    card.classList.toggle("open");
    const btn = card.querySelector("[data-toggle]");
    btn.textContent = card.classList.contains("open") ? "▲" : "▼";
  });

  list.appendChild(card);
});

// scroll to first upcoming
if(firstUpcomingId){
  requestAnimationFrame(()=>{
    document.getElementById(firstUpcomingId).scrollIntoView({behavior:"instant", block:"start"});
    requestAnimationFrame(initStickyHeader);
  });
} else {
  initStickyHeader();
}

function initStickyHeader(){
  const header = document.querySelector("header");
  let ticking = false;
  const update = () => {
    const y = window.scrollY;
    if(y > 40) header.classList.add("scrolled");
    else header.classList.remove("scrolled");
    ticking = false;
  };
  // sync to current scroll position (since auto-scroll already happened)
  update();
  window.addEventListener("scroll", () => {
    if(!ticking){
      requestAnimationFrame(update);
      ticking = true;
    }
  }, {passive:true});
}
</script>
