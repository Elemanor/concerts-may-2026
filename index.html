  :root{

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{

    background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    background-attachment:fixed;
    color:var(--text);
    line-height:1.45;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    min-height:100vh;
  }
  header{
    padding:20px 18px 14px;
    text-align:center;
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:10;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background:rgba(15,10,31,.85);
  }
  h1{margin:0;font-size:22px;font-weight:700;letter-spacing:.2px}
  .sub{margin:4px 0 0;font-size:13px;color:var(--muted)}
  .from{font-size:12px;color:var(--accent);margin-top:6px;font-weight:500}
  main{padding:14px 12px 40px;max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:14px}

  .day-divider{
    color:var(--muted);
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    text-align:center;
    margin:10px 0 -4px;
    font-weight:600;
  }
  .day-divider.today{color:var(--today)}

  .card{
    background:var(--card);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 4px 18px rgba(0,0,0,.35);
    border:1px solid var(--line);
    transition:opacity .25s, transform .25s, box-shadow .25s;
    scroll-margin-top:90px;
  }
  .card.past{
    opacity:.42;
    background:var(--card-past);
    filter:grayscale(.6);
  }
  .card.next{
    border-color:var(--accent);
    box-shadow:0 6px 28px rgba(255,184,107,.25);
  }
  .card.open{
    transform:none;
  }

  .hero{
    position:relative;
    height:160px;
    display:flex;
    align-items:flex-end;
    padding:10px 14px;
    color:#fff;
    overflow:hidden;
    background-size:cover;
    background-position:center;
  }
  .hero::before{
    content:"";
    position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,.15) 0%,rgba(0,0,0,.65) 100%);
  }
  .hero .icon{
    position:absolute;
    right:14px; top:14px;
    font-size:38px;
    opacity:.9;
    filter:drop-shadow(0 2px 8px rgba(0,0,0,.6));
  }
  .hero .date{
    position:relative;
    font-size:13px;
    background:rgba(0,0,0,.55);
    padding:5px 10px;
    border-radius:999px;
    backdrop-filter:blur(6px);
    font-weight:600;
  }

  .body{padding:14px 16px 4px}
  .title{font-size:17px;font-weight:700;margin:0 0 6px;line-height:1.3}
  .meta{
    display:flex;flex-wrap:wrap;gap:8px;
    font-size:12.5px;color:var(--muted);
    margin-bottom:10px;
  }
  .meta span{display:inline-flex;align-items:center;gap:4px}
  .pill{
    background:rgba(123,227,164,.14);
    color:var(--ok);
    padding:3px 9px;
    border-radius:999px;
    font-weight:600;
    font-size:11.5px;
  }
  .desc{
    font-size:14px;
    color:#e1d8ef;
    margin:0;
    max-height:0;
    overflow:hidden;
    transition:max-height .35s ease, margin .25s, padding .25s;
  }
  .card.open .desc{max-height:600px;margin:0 0 12px;padding-top:2px}
  .card.past .desc{color:var(--muted-past)}

  .walk{
    display:flex;
    gap:10px;
    padding:10px 12px;
    background:rgba(255,255,255,.04);
    border-radius:12px;
    margin:0 0 12px;
    font-size:13px;
    align-items:center;
  }
  .walk .lead{font-size:18px}
  .walk b{color:var(--accent)}
  .card.past .walk b{color:var(--muted)}

  .actions{
    display:flex;gap:8px;
    padding:0 0 14px;
    align-items:stretch;
  }
  .btn{
    flex:1;
    text-align:center;
    text-decoration:none;
    padding:11px 12px;
    border-radius:12px;
    font-size:13.5px;
    font-weight:600;
    border:none;
    cursor:pointer;
    color:#fff;
    display:flex;align-items:center;justify-content:center;
  }
  .btn[data-toggle]{flex:0 0 48px;font-size:14px}
  .btn.primary{
    background:linear-gradient(135deg,var(--accent),var(--accent2));

  }
  .btn.ghost{
    background:rgba(255,255,255,.06);
    border:1px solid var(--line);
    color:var(--text);
  }

    background:rgba(255,255,255,.08);
    color:var(--muted);
  }

  .toggle{
    width:100%;
    background:transparent;
    border:none;
    color:var(--muted);
    font-size:12px;
    padding:6px 0 12px;
    cursor:pointer;
    letter-spacing:.5px;
  }

    text-align:center;
    color:var(--muted);
    font-size:11.5px;
    padding:20px 16px 30px;
    line-height:1.6;
  }
  footer a{color:var(--accent);text-decoration:none}

  @media (min-width: 600px){
    main{padding:18px 20px 40px}
    .hero{height:150px}
  }
</style>
</head>

// --- helpers ---
function eventDateTime(e){
  return new Date(e.date + "T" + e.time + ":00-04:00");
}
function isPast(e){
  const dt = eventDateTime(e);
  const end = new Date(dt.getTime() + 90*60*1000); // event "active" 90 min
  return end < TODAY;
}
function dayLabel(dateStr){
  const d = new Date(dateStr + "T12:00:00-04:00");
  const days = ["Воскресенье","Понедельник","Вторник","Среда","Четверг","Пятница","Суббота"];
  const months = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
  return days[d.getDay()] + ", " + d.getDate() + " " + months[d.getMonth()];
}
function isToday(dateStr){
  const d = new Date(dateStr + "T12:00:00-04:00");
  return d.toDateString() === TODAY.toDateString();
}
function fmtKm(km){
  if(km == null) return "—";
  return km < 1 ? Math.round(km*1000) + " м" : km.toFixed(1) + " км";
}
function fmtMin(min){
  if(min == null) return "—";
  if(min < 60) return min + " мин";
  const h = Math.floor(min/60), m = min%60;
  return h + " ч " + (m ? m + " мин" : "");
}
function mapsLink(venue){
  const o = encodeURIComponent(ORIGIN_NAME);
  const d = venue.mapDest || encodeURIComponent(venue.addr + " Toronto");
  return `https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${d}&travelmode=walking`;
}

// --- render ---
const list = document.getElementById("list");
let firstUpcomingId = null;
let lastDay = null;

EVENTS.sort((a,b)=>eventDateTime(a)-eventDateTime(b)).forEach((e,i)=>{
  const past = isPast(e);
  const venue = VENUES[e.venue];
  const t = TYPE_META[e.type];
  const id = "ev-" + i;

  if(!past && firstUpcomingId === null) firstUpcomingId = id;

  // day divider
  if(e.date !== lastDay){
    const div = document.createElement("div");
    div.className = "day-divider" + (isToday(e.date) ? " today" : "");
    div.textContent = dayLabel(e.date) + (isToday(e.date) ? " · сегодня" : "");
    list.appendChild(div);
    lastDay = e.date;
  }

  const card = document.createElement("article");
  card.className = "card" + (past ? " past" : "");
  card.id = id;

  const isNext = !past && firstUpcomingId === id;
  if(isNext) card.classList.add("next","open");

  const walkHTML = venue.km != null
    ? `<div class="walk">
         <span class="lead">🚶</span>
         <div>пешком <b>${fmtMin(venue.min)}</b> · <b>${fmtKm(venue.km)}</b><br>
              <small style="color:var(--muted)">${venue.name}, ${venue.addr}</small></div>
       </div>`
    : `<div class="walk">
         <span class="lead">🗺️</span>
         <div>${venue.name}<br><small style="color:var(--muted)">${venue.addr}</small></div>
       </div>`;

  card.innerHTML = `
    <div class="hero" style="background-image:url('images/${e.type}.jpg')">
      <span class="icon">${t.icon}</span>
      <span class="date">${e.time}</span>
    </div>
    <div class="body">
      <h2 class="title">${e.title}</h2>
      <div class="meta">
        <span>🎼 ${t.label}</span>
        <span class="pill">Бесплатно</span>
      </div>
      <p class="desc">${e.desc}</p>
      ${walkHTML}
      <div class="actions">
        <a class="btn primary" href="${mapsLink(venue)}" target="_blank" rel="noopener">🚶 Маршрут</a>
        <a class="btn ghost" href="${venue.site}" target="_blank" rel="noopener">ℹ️ Сайт</a>
        <button class="btn ghost" data-toggle aria-label="Развернуть">${isNext ? "▲" : "▼"}</button>
      </div>
    </div>
  `;

  card.querySelector("[data-toggle]").addEventListener("click",()=>{
    card.classList.toggle("open");
    const btn = card.querySelector("[data-toggle]");
    btn.textContent = card.classList.contains("open") ? "▲" : "▼";
  });

  list.appendChild(card);
});

// scroll to first upcoming
if(firstUpcomingId){
  requestAnimationFrame(()=>{
    document.getElementById(firstUpcomingId).scrollIntoView({behavior:"instant", block:"start"});
  });
}
</script>
</body>
</html>
